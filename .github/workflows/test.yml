name: Termux Builder Matrix Test

on:
  push:
  workflow_dispatch:

jobs:
  test-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [
          "termux/package-builder:latest",
          "excedrin/termux-builder:latest",
          "ghcr.io/crotm/termux-builder:latest"
        ]

    steps:
      - name: Checkout termux-packages
        uses: actions/checkout@v4
        with:
          repository: termux/termux-packages
          path: termux-packages

      - name: Setup Environment
        run: |
          chmod +x termux-packages/scripts/run-docker.sh
          echo "Host-to-Container-Check" > termux-packages/mount-test.txt

      - name: Run Verification Suite via run-docker.sh
        working-directory: ./termux-packages
        env:
          TERMUX_BUILDER_IMAGE_NAME: ${{ matrix.image }}
          CONTAINER_NAME: builder-${{ strategy.job-index }}
          TERMUX_DOCKER_USE_SUDO: "1"
        run: |
          echo "--- TESTING IMAGE: ${{ matrix.image }} ---"

          # 1. Check User (Does not need login shell)
          ./scripts/run-docker.sh whoami

          # 2. Check Environment Variables (Requires Login Shell '-lc')
          # We check for NDK or ANDROID_NDK_ROOT
          echo "Checking NDK Variable..."
          ./scripts/run-docker.sh bash -lc 'echo "NDK_VAR_RESULT: ${NDK:-$ANDROID_NDK_ROOT}"'

          # 3. Check Compiler (Requires Login Shell to find clang in PATH)
          echo "Checking Compiler Path..."
          ./scripts/run-docker.sh bash -lc 'which clang || echo "clang not in PATH"'
          ./scripts/run-docker.sh bash -lc 'clang --version | head -n 1'

          # 4. Check Python
          ./scripts/run-docker.sh bash -lc 'python3 --version'

          # 5. Run the actual build script help (The ultimate test)
          # This script is designed to be run directly
          echo "Checking Build Script..."
          ./scripts/run-docker.sh ./build-package.sh -h | head -n 5

      - name: Cleanup
        if: always()
        working-directory: ./termux-packages
        env:
          TERMUX_BUILDER_IMAGE_NAME: ${{ matrix.image }}
          CONTAINER_NAME: builder-${{ strategy.job-index }}
          TERMUX_DOCKER_USE_SUDO: "1"
        run: |
          ./scripts/run-docker.sh ./build-package.sh -d -j8 python

      - name: Cleanup
        if: always()
        run: |
          sudo docker rm -f builder-${{ strategy.job-index }} || true
