name: Termux Builder Matrix Test

on:
  push:
  workflow_dispatch:

jobs:
  test-images:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        image: [
          "termux/package-builder:latest",
          "excedrin/termux-builder:latest",
          "ghcr.io/crotm/termux-builder:latest"
        ]

    steps:
      - name: Checkout termux-packages
        uses: actions/checkout@v4
        with:
          repository: termux/termux-packages
          path: termux-packages

      - name: Setup Environment
        run: |
          # Ensure the script is executable
          chmod +x termux-packages/scripts/run-docker.sh
          # Create a dummy file to verify volume mounting later
          echo "Host-to-Container-Check" > termux-packages/mount-test.txt

      - name: Run Verification Suite via run-docker.sh
        working-directory: ./termux-packages
        env:
          TERMUX_BUILDER_IMAGE_NAME: ${{ matrix.image }}
          CONTAINER_NAME: builder-${{ strategy.job-index }}
          TERMUX_DOCKER_USE_SUDO: "1"
        run: |
          echo "--- STARTING TEST FOR ${{ matrix.image }} ---"

          # 1. Test Identity and Permissions
          echo "Testing User Identity:"
          ./scripts/run-docker.sh whoami
          ./scripts/run-docker.sh id

          # 2. Test Environment Variables (NDK, etc.)
          echo "Testing Environment Variables:"
          ./scripts/run-docker.sh bash -c 'echo "NDK Path: ${NDK:-$ANDROID_NDK_ROOT}"'

          # 3. Test Volume Mounting (Verify the script mounted the host dir correctly)
          echo "Testing Volume Mount:"
          ./scripts/run-docker.sh cat mount-test.txt

          # 4. Test Compiler Toolchain
          echo "Testing Compiler:"
          ./scripts/run-docker.sh bash -c 'command -v clang && clang --version | head -n 1'

          # 5. Test Python and Build Dependencies
          echo "Testing Python:"
          ./scripts/run-docker.sh python3 --version

          # 6. Test the Build Script Entrypoint
          echo "Testing Build Script Help:"
          ./scripts/run-docker.sh ./build-package.sh -h | head -n 5
      - name: List full structure
        run: |
          apt update
          apt install tree
          tree $FINAL_NDK_PATH

      - name: Cleanup
        if: always()
        run: |
          sudo docker rm -f builder-${{ strategy.job-index }} || true
