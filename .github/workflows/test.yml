name: Termux Builder Matrix Test

on:
  push:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [
          "termux/package-builder:latest",
          "excedrin/termux-builder:latest",
          "ghcr.io/crotm/termux-builder:latest"
        ]

    container:
      image: ${{ matrix.image }}
      options: --user root

    steps:
      - name: Inspect Environment Variables
        run: |
          echo "--- ALL ENVIRONMENT VARIABLES ---"
          env | sort
          echo "---------------------------------"

      - name: Locate NDK
        run: |
          export NDK="/home/builder/lib/android-ndk"
          /usr/bin/sudo /usr/bin/apt install tree
          # Check multiple common variables used in Termux images
          if [ -n "$NDK" ]; then
            echo "NDK found via \$NDK: $NDK"
            echo "FINAL_NDK_PATH=$NDK" >> $GITHUB_ENV
          elif [ -n "$ANDROID_NDK_ROOT" ]; then
            echo "NDK found via \$ANDROID_NDK_ROOT: $ANDROID_NDK_ROOT"
            echo "FINAL_NDK_PATH=$ANDROID_NDK_ROOT" >> $GITHUB_ENV
          elif [ -d "/home/builder/lib/android-ndk" ]; then
            echo "NDK found at default path: /home/builder/lib/android-ndk"
            echo "FINAL_NDK_PATH=/home/builder/lib/android-ndk" >> $GITHUB_ENV
          else
            echo "NDK variable not set. Searching filesystem..."
            SEARCH_RESULT=$(find / -name "source.properties" | grep "ndk" | head -n 1 | sed 's|/source.properties||')
            if [ -n "$SEARCH_RESULT" ]; then
              echo "NDK found via search: $SEARCH_RESULT"
              echo "FINAL_NDK_PATH=$SEARCH_RESULT" >> $GITHUB_ENV
            else
              echo "ERROR: Could not find NDK anywhere!"
              exit 1
            fi
          fi
          /usr/bin/tree $NDK

      - name: Verify Compiler and Python
        run: |
          echo "Using NDK Path: $FINAL_NDK_PATH"
          
          # Find the clang compiler inside the NDK
          # It's usually in toolchains/llvm/prebuilt/linux-x86_64/bin/clang
          NDK_CLANG=$(find $FINAL_NDK_PATH -name "clang" | grep "bin/clang" | head -n 1)
          
          if [ -f "$NDK_CLANG" ]; then
            echo "NDK Clang found: $NDK_CLANG"
            $NDK_CLANG --version | head -n 1
          else
            echo "Warning: NDK Clang not found at expected sub-path."
          fi
          
          echo -n "Python3 version: "
          python3 --version

      - name: Test Build Script Entrypoint
        run: |
          git clone --depth 1 https://github.com/termux/termux-packages.git
          cd termux-packages
          # This confirms the image has all dependencies to run the main build logic
          ./build-package.sh -h | head -n 5
